<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailSpace AI — Buscador Inteligente de Locales</title>
    
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Custom Style System -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="dashboard-container">
        
        <!-- COLUMNA 1: CHAT DEL ASISTENTE DE IA -->
        <aside class="chat-sidebar">
            <div class="brand-header">
                <div class="brand-title">
                    <span class="brand-logo">🤖</span>
                    <h1>RetailSpace AI</h1>
                </div>
                <button type="button" id="btn-toggle-settings" class="btn-icon-only" title="Configuración de la API de Gemini">⚙️</button>
            </div>
            
            <!-- Panel de Configuración de API Key -->
            <div id="api-settings-panel" class="api-settings-panel">
                <div class="settings-group">
                    <div class="settings-title-row">
                        <label for="gemini-key-input">Gemini API Key</label>
                        <span id="api-status-badge" class="status-badge status-disconnected">🟡 Simulación Local</span>
                    </div>
                    <div class="input-with-action">
                        <input type="password" id="gemini-key-input" placeholder="AIzaSy..." autocomplete="off">
                        <button type="button" id="btn-show-key" class="btn-show-key" title="Mostrar/Ocultar clave">👁️</button>
                    </div>
                    <p class="settings-help">La clave se guarda localmente en tu navegador y conecta directamente con Google Gemini.</p>
                </div>
            </div>
            
            <div id="chat-feed" class="chat-feed">
                <!-- Se inyecta dinámicamente -->
            </div>
            
            <!-- Sugerencias de búsqueda rápida -->
            <div class="chat-suggestions">
                <button type="button" class="suggestion-chip" onclick="sendSuggestion('Moda en Colón Valencia')">Colón, Valencia 👕</button>
                <button type="button" class="suggestion-chip" onclick="sendSuggestion('Gimnasio en Barcelona')">Balmes, Barcelona 💪</button>
                <button type="button" class="suggestion-chip" onclick="sendSuggestion('Restaurante Fuencarral Madrid < 5000€')">Fuencarral, Madrid 🍔</button>
            </div>
            
            <form id="chat-form" class="chat-form">
                <div class="chat-input-wrapper">
                    <input type="text" id="chat-input" placeholder="Pregunta a la IA por un local comercial..." autocomplete="off">
                </div>
                <button type="submit" class="btn-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </aside>

        <!-- COLUMNA 2: MAPA INTERACTIVO -->
        <main class="map-viewport">
            
            <!-- PANEL DE FILTROS SUPERIOR (Flotante) -->
            <div class="map-filters">
                <div class="filter-group">
                    <label for="filter-category">Categoría:</label>
                    <select id="filter-category">
                        <option value="RESTAURANTE">🍔 Restauración & Cafetería</option>
                        <option value="MODA" selected>👕 Moda & Accesorios</option>
                        <option value="ALIMENTACION">🛒 Supermercado & Alimentación</option>
                        <option value="SERVICIOS">💼 Oficina & Servicios</option>
                        <option value="GIMNASIO">💪 Gimnasios & Deporte</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="filter-budget">Presupuesto máx:</label>
                    <input type="range" id="filter-budget" min="1000" max="12000" step="500" value="12000">
                    <span id="filter-budget-val" style="font-size: 0.78rem; font-weight: 600; width: 70px; display: inline-block;">Sin límite</span>
                </div>
                
                <div class="filter-group">
                    <label for="filter-size">Superficie:</label>
                    <select id="filter-size">
                        <option value="all">Cualquiera</option>
                        <option value="pequeño">Pequeño (< 100m²)</option>
                        <option value="mediano">Mediano (100 - 150m²)</option>
                        <option value="grande">Grande (> 150m²)</option>
                    </select>
                </div>
            </div>

            <!-- Div del Mapa -->
            <div id="map"></div>
        </main>

        <!-- COLUMNA 3: FEED DE INMUEBLES -->
        <section class="property-feed">
            <div class="feed-header">
                <h2>Locales Destacados</h2>
            </div>
            
            <div id="properties-list-container" class="properties-list">
                <!-- Se inyecta dinámicamente -->
            </div>
        </section>

        <!-- COLUMNA 4: INFORME DE GEOMARKETING (Se desliza de la derecha) -->
        <section id="analysis-details-panel" class="detail-panel">
            <!-- Se inyecta dinámicamente al seleccionar un local -->
        </section>

    </div>

    <!-- MODAL: AGREGAR INMUEBLE MANUAL (Clic derecho en el mapa) -->
    <div id="add-property-modal" class="modal">
        <div class="modal-content">
            <h3>📌 Dar de alta Local para Análisis</h3>
            <form id="add-property-form">
                <div class="form-group">
                    <label>Coordenadas de Ubicación:</label>
                    <input type="text" id="new-coords" readonly>
                </div>
                <div class="form-group">
                    <label for="new-name">Nombre del Inmueble:</label>
                    <input type="text" id="new-name" placeholder="Ej. Esquina Primaria Centro" required>
                </div>
                <div class="form-group">
                    <label for="new-category">Giro Comercial:</label>
                    <select id="new-category">
                        <option value="RESTAURANTE">🍔 Restauración & Cafetería</option>
                        <option value="MODA">👕 Moda & Accesorios</option>
                        <option value="ALIMENTACION">🛒 Supermercado & Alimentación</option>
                        <option value="SERVICIOS">💼 Oficina & Servicios</option>
                        <option value="GIMNASIO">💪 Gimnasios & Deporte</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="new-size">Superficie (m²):</label>
                    <input type="number" id="new-size" min="20" max="1000" value="120" required>
                </div>
                <div class="form-group">
                    <label for="new-rent">Alquiler estimado (€/mes):</label>
                    <input type="number" id="new-rent" min="300" max="50000" value="2500" required>
                </div>
                <div class="form-group">
                    <label for="new-traffic">Tráfico Peatonal Estimado:</label>
                    <select id="new-traffic">
                        <option value="Alto">Alto (Eje Comercial Prime)</option>
                        <option value="Medio" selected>Medio (Zona Residencial/Mixta)</option>
                        <option value="Bajo">Bajo (Secundario)</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" id="btn-cancel-add" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Añadir Local</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Leaflet Map JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Application Logic Modules -->
    <script src="js/config.js"></script>
    <script src="js/mockdata.js"></script>
    <script src="js/api.js"></script>
    <script src="js/agent.js"></script>
    <script src="js/app.js"></script>

</body>
</html>
